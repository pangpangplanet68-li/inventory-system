<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留貨管理系統</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    #camera-container { position: relative; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 10px; border: 2px solid #dbdbdb; }
    #video { width: 100%; display: block; }
    #scanner-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #ff3860; box-shadow: 0 0 10px #ff3860; transform: translateY(-50%); }
    .loading-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
    .denied-msg { display: none; text-align: center; padding: 50px 20px; }
  </style>
</head>
<body class="p-4">
  <div id="loading-overlay" class="loading-overlay">
    <div class="button is-loading is-large is-ghost"></div>
    <p id="loading-text" class="mt-2">正在載入系統...</p>
  </div>

  <div id="denied-container" class="denied-msg">
    <h1 class="title is-4 has-text-danger">⚠️ 存取受限</h1>
    <p>您的帳號尚未獲得管理權限。</p>
    <p class="is-size-7 mt-4 has-text-grey">Your ID: <span id="my-user-id"></span></p>
  </div>

  <div id="app" style="display:none;">
    <h1 class="title is-5 has-text-centered">📦 留貨管理系統</h1>
    
    <div class="field">
      <label class="label">買家 (Buyer)</label>
      <input class="input" list="buyer-list" id="buyer" placeholder="選擇或輸入買家">
      <datalist id="buyer-list"></datalist>
    </div>

    <div class="field">
      <label class="label">商品貨號 (SKU)</label>
      <div id="camera-container" style="display:none;">
        <video id="video" autoplay playsinline></video>
        <div id="scanner-line"></div>
        <canvas id="canvas" style="display:none;"></canvas>
      </div>
      
      <input class="input mb-2" id="sku" placeholder="請掃描或輸入貨號">
      
      <div class="buttons">
        <button class="button is-link is-light is-flexible" onclick="runLineScan()">📷 掃條碼</button>
        <button id="ocr-toggle" class="button is-info is-light is-flexible" onclick="toggleOCR()">🔍 辨識文字</button>
      </div>
      <button id="capture-btn" class="button is-danger is-fullwidth mt-1" style="display:none;" onclick="executeOCR()">📸 擷取並辨識</button>
    </div>

    <div class="columns is-mobile">
      <div class="column"><label class="label">顏色</label><input class="input" id="color"></div>
      <div class="column"><label class="label">尺寸</label><input class="input" id="size"></div>
    </div>

    <div class="columns is-mobile">
      <div class="column is-4">
        <label class="label">數量</label>
        <input class="input" type="number" id="qty" value="1">
      </div>
      <div class="column">
        <label class="label">售價</label>
        <input class="input" type="number" id="price" placeholder="0">
      </div>
    </div>

    <div class="field">
      <label class="label">廠商 (Vendor)</label>
      <input class="input" list="vendor-list" id="vendor" placeholder="選擇或輸入廠商">
      <datalist id="vendor-list"></datalist>
    </div>

    <hr>
    <button id="submit-btn" class="button is-success is-fullwidth is-large" onclick="submitData()">確認送出</button>
    <div class="has-text-centered mt-2 is-size-7 has-text-grey">
      操作員: <span id="op-name">-</span><br>
      <span id="op-id" style="font-size: 0.8em; opacity: 0.6;"></span>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzrJmo7Ylz2LsyXJFavicvVqZagixYa0E9tVhbmgHEnMi4e4quy-ych99P_3jpj2isD7g/exec"; 
    let videoStream = null;
    let currentUser = { id: "", name: "" };

    async function callGAS(action, formData = null) {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: action, formData: formData })
      });
      return await response.json();
    }

    window.onload = async () => {
      try {
        const serverData = await callGAS('getInitialData');
        await startLiff(serverData);
      } catch (err) {
        alert("系統啟動失敗: " + err);
      }
    };

    async function startLiff(serverData) {
      try {
        await liff.init({ liffId: serverData.liffId });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        
        currentUser.id = profile.userId;
        currentUser.name = profile.displayName;

        if (!serverData.adminList.includes(currentUser.id)) {
          document.getElementById('loading-overlay').style.display = 'none';
          document.getElementById('denied-container').style.display = 'block';
          document.getElementById('my-user-id').innerText = currentUser.id;
          return;
        }

        document.getElementById('op-name').innerText = currentUser.name;
        document.getElementById('op-id').innerText = currentUser.id;
        updateDatalists(serverData.buyers, serverData.vendors);
        
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      } catch (err) { alert("LIFF 錯誤: " + err); }
    }

    function updateDatalists(buyers, vendors) {
      const bDl = document.getElementById('buyer-list');
      const vDl = document.getElementById('vendor-list');
      // 使用 join('') 避免逗號出現，確保清單乾淨
      bDl.innerHTML = buyers.map(b => `<option value="${b}">`).join('');
      vDl.innerHTML = vendors.map(v => `<option value="${v}">`).join('');
    }

    async function runLineScan() {
      try {
        const result = await liff.scanCodeV2();
        document.getElementById('sku').value = result.value;
      } catch (e) { console.error(e); }
    }

    async function toggleOCR() {
      const container = document.getElementById('camera-container');
      const btn = document.getElementById('ocr-toggle');
      const video = document.getElementById('video');
      if (container.style.display === 'none') {
        try {
          videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          video.srcObject = videoStream;
          container.style.display = 'block';
          document.getElementById('capture-btn').style.display = 'block';
          btn.innerText = '關閉相機';
        } catch (e) { alert("無法開啟相機"); }
      } else { closeOCR(); }
    }

    function closeOCR() {
      if (videoStream) videoStream.getTracks().forEach(t => t.stop());
      document.getElementById('camera-container').style.display = 'none';
      document.getElementById('capture-btn').style.display = 'none';
      document.getElementById('ocr-toggle').innerText = '🔍 辨識文字';
    }

    async function executeOCR() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const overlay = document.getElementById('loading-overlay');
      const loadingText = document.getElementById('loading-text');
      
      loadingText.innerText = "辨識中...";
      overlay.style.display = 'flex';
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
        document.getElementById('sku').value = text.replace(/[^A-Z0-9-]/g, '').trim();
        closeOCR();
      } catch (e) { alert("辨識失敗"); }
      
      overlay.style.display = 'none';
      loadingText.innerText = "正在處理..."; // 修復點：將文字回復
    }

    async function submitData() {
      const btn = document.getElementById('submit-btn');
      const payload = {
        buyer: document.getElementById('buyer').value,
        sku: document.getElementById('sku').value,
        color: document.getElementById('color').value,
        size: document.getElementById('size').value,
        qty: document.getElementById('qty').value,
        price: document.getElementById('price').value,
        vendor: document.getElementById('vendor').value,
        operator: currentUser.name,
        operatorId: currentUser.id
      };

      if (!payload.buyer || !payload.sku || !payload.vendor) return alert("請填寫買家、貨號與廠商");

      btn.classList.add('is-loading');
      document.getElementById('loading-overlay').style.display = 'flex';

      try {
        const res = await callGAS('processForm', payload);
        alert(res.message);
        
        if(res.status === "success") {
          // 清空表單
          document.getElementById('buyer').value = "";
          document.getElementById('sku').value = "";
          document.getElementById('color').value = "";
          document.getElementById('size').value = "";
          document.getElementById('qty').value = "1";
          document.getElementById('price').value = "";
          document.getElementById('vendor').value = "";
          
          // 送出成功後立即同步一次最新名單
          const newData = await callGAS('getInitialData');
          updateDatalists(newData.buyers, newData.vendors);
        }
      } catch (e) {
        alert("送出失敗: " + e);
      } finally {
        btn.classList.remove('is-loading');
        document.getElementById('loading-overlay').style.display = 'none';
      }
    }
  </script>
</body>
</html>
